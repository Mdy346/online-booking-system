server:
  port: 0  # random port for tests

spring:
  # ===== H2 In-Memory Database for test isolation =====
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:h2:mem:test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false

  # ===== Auto-run DDL for tests =====
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/init_schema.sql

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: test-secret-key-for-unit-tests-only-1234567890abcdef
  expiration: 3600000

logging:
  level:
    com.booking: DEBUG

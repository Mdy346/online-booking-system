server:
  port: 8080

spring:
  application:
    name: online-booking-backend

  # ===== Data Source =====
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/db_online_reservation?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
      username: root
      password: Mdy610200716
      # Connection pool tuning
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  # ===== Jackson Serialization =====
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    property-naming-strategy: LOWER_CAMEL_CASE

# ===== MyBatis-Plus Configuration =====
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.booking.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===== JWT Configuration =====
jwt:
  secret: K8sXp2mV9qL4nR7tW1yZ3bA6cD0eF5gHiJkMoPqRsTuVwXyZaBdCfEgNhIjKlMnOpQrStUvWxYz123456
  expiration: 86400000  # 24 hours in milliseconds

# ===== Logging =====
logging:
  level:
    com.booking: DEBUG
    com.baomidou.mybatisplus: DEBUG


